<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECTOR REVEAL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;user-select:none;}
canvas{position:fixed;top:0;left:0;display:block;}

#starsHud{position:fixed;top:18px;right:22px;z-index:20;pointer-events:none;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;color:#ffdd44;text-shadow:0 0 12px #ffdd44,0 0 28px rgba(255,220,40,.35);}

#muteBtn{position:fixed;top:16px;right:110px;z-index:30;background:transparent;border:1px solid rgba(0,255,255,.2);color:rgba(0,255,255,.5);font-size:12px;padding:5px 9px;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s;}
#muteBtn:hover{border-color:rgba(0,255,255,.6);color:#00ffff;}

/* ── SELECTOR ── */
#selector{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(0,4,18,.97);transition:opacity .4s;}
#selector.hidden{opacity:0;pointer-events:none;}
#sel-title{font-family:'Orbitron',sans-serif;font-size:clamp(12px,2.5vw,20px);font-weight:900;letter-spacing:10px;color:#00ffff;text-shadow:0 0 20px #00ffff;}
#sel-sub{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:6px;color:rgba(0,200,255,.35);margin-top:-16px;}
#sel-grid{display:grid;grid-template-columns:repeat(4,148px);gap:10px;}
@media(max-width:680px){#sel-grid{grid-template-columns:repeat(2,148px);}}
.sel-card{width:148px;height:118px;border:1px solid rgba(0,255,255,.15);background:rgba(0,12,30,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .18s;position:relative;}
.sel-card:hover:not(.locked){border-color:rgba(0,255,255,.55);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,255,255,.12);}
.sel-card.locked{opacity:.28;cursor:not-allowed;filter:grayscale(.7);}
.sel-card.done{border-color:rgba(0,255,140,.35);}
.sel-lv{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:4px;color:rgba(0,200,255,.45);}
.sel-name{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;letter-spacing:1.5px;color:rgba(0,220,255,.8);text-align:center;padding:0 6px;}
.sel-badge{font-family:'Orbitron',sans-serif;font-size:6px;letter-spacing:2px;color:rgba(0,255,120,.5);}
.sel-card.done .sel-badge{color:#00ff88;}

/* ── HUD ── */
#hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;font-family:'Orbitron',sans-serif;}
#hudTitle{color:rgba(0,220,255,.35);font-size:8px;letter-spacing:8px;}
#sectorLabel{color:var(--hcol,#00ffff);font-size:12px;font-weight:700;letter-spacing:5px;text-shadow:0 0 12px var(--hcol,#00ffff);margin-top:6px;min-height:18px;}
#progressTrack{width:250px;height:2px;background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.2);margin:8px auto 6px;}
#progressFill{height:100%;width:0%;transition:width .06s;}
#indicators{color:rgba(0,200,255,.38);font-size:10px;letter-spacing:5px;}

/* ── FLASK CTRL ── */
#flaskCtrl{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  display:none;flex-direction:column;align-items:center;gap:6px;z-index:10;
}
#flaskTopRow{display:flex;align-items:center;gap:16px;}
#flaskTotalInfo{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:rgba(0,200,255,.5);}
#flaskHint{font-family:'Orbitron',sans-serif;font-size:6px;letter-spacing:3px;color:rgba(0,150,200,.3);}
#buyFlaskBtn{
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;
  color:#00ffff;background:transparent;border:1px solid rgba(0,255,255,.3);
  padding:7px 14px;cursor:pointer;text-shadow:0 0 8px #00ffff;
  box-shadow:0 0 12px rgba(0,255,255,.1);transition:all .15s;
}
#buyFlaskBtn:hover:not(:disabled){border-color:#00ffff;box-shadow:0 0 22px rgba(0,255,255,.4);}
#buyFlaskBtn:disabled{opacity:.22;cursor:not-allowed;}

/* ── PANEL ── */
#panel{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:10px;}
#chargeBtn{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:8px;
  color:var(--hcol,#00ffff);background:transparent;border:2px solid var(--hcol,#00ffff);
  padding:12px 44px;cursor:pointer;text-shadow:0 0 10px var(--hcol,#00ffff);
  box-shadow:0 0 24px rgba(0,255,255,.16),inset 0 0 18px rgba(0,255,255,.03);
  transition:all .1s;outline:none;position:relative;
}
#chargeBtn::before{content:'';position:absolute;inset:-5px;border:1px solid rgba(0,255,255,.1);pointer-events:none;}
#chargeBtn:hover{box-shadow:0 0 48px rgba(0,255,255,.42),inset 0 0 24px rgba(0,255,255,.07);}
#chargeBtn.active{transform:scale(.965);background:rgba(0,255,255,.09);box-shadow:0 0 80px rgba(0,255,255,.7),inset 0 0 32px rgba(0,255,255,.12);}
#hint{color:rgba(0,200,255,.22);font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:5px;}

/* ── WIN ── */
#win{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,4,18,.93);opacity:0;pointer-events:none;transition:opacity 1s;z-index:40;}
#win.show{opacity:1;pointer-events:all;}
#winEmoji{font-size:52px;animation:wBob 2s ease-in-out infinite;}
#winTitle{font-family:'Orbitron',sans-serif;font-size:clamp(16px,4vw,34px);font-weight:900;color:var(--hcol,#00ffff);letter-spacing:8px;text-shadow:0 0 30px var(--hcol,#00ffff);animation:wPulse 2.2s ease-in-out infinite;}
#winSub{font-family:'Orbitron',sans-serif;font-size:10px;color:rgba(0,255,255,.45);letter-spacing:4px;}
#winBtns{display:flex;gap:14px;margin-top:22px;}
.wBtn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;color:#ff44ff;background:transparent;border:2px solid #ff44ff;padding:10px 22px;cursor:pointer;text-shadow:0 0 8px #ff44ff;box-shadow:0 0 18px rgba(255,68,255,.22);transition:all .2s;}
.wBtn:hover{background:rgba(255,68,255,.1);box-shadow:0 0 38px rgba(255,68,255,.55);}
.wBtn.next{color:#00ffff;border-color:#00ffff;text-shadow:0 0 8px #00ffff;box-shadow:0 0 18px rgba(0,255,255,.22);}
.wBtn.next:hover{background:rgba(0,255,255,.1);box-shadow:0 0 38px rgba(0,255,255,.55);}
@keyframes wBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wPulse{0%,100%{opacity:.85}50%{opacity:1;filter:brightness(1.3)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="starsHud">⭐ <span id="starsCount">0</span></div>
<button id="muteBtn">🔊</button>

<div id="selector">
  <div id="sel-title">SELECT MISSION</div>
  <div id="sel-sub">TACTICAL RESTORATION UNIT</div>
  <div id="sel-grid"></div>
</div>

<div id="hud">
  <div id="hudTitle">TACTICAL RESTORATION UNIT</div>
  <div id="sectorLabel">INITIALIZING</div>
  <div id="progressTrack"><div id="progressFill"></div></div>
  <div id="indicators"></div>
</div>

<div id="flaskCtrl">
  <div id="flaskTopRow">
    <span id="flaskTotalInfo">AUTO: 1.0/s</span>
    <button id="buyFlaskBtn">⊕ FLASK #2 · 8⭐</button>
  </div>
  <div id="flaskHint">CLICK FLASK TO UPGRADE</div>
</div>

<div id="panel">
  <button id="chargeBtn">⚡ CHARGE ⚡</button>
  <div id="hint">CLICK · HOLD · FLASK AUTO-FIRES</div>
</div>

<div id="win">
  <div id="winEmoji"></div>
  <div id="winTitle">MISSION COMPLETE</div>
  <div id="winSub"></div>
  <div id="winBtns">
    <button class="wBtn" onclick="showSelector()">◀ SELECT</button>
    <button class="wBtn next" id="nextBtn" onclick="nextLevel()">NEXT ▶</button>
  </div>
</div>

<script>
'use strict';

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:false});
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;rebuildPolys();initStarField();}
window.addEventListener('resize',resize);
const SCX=()=>W*.5, SCY=()=>H*.40;
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
function hexRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx=null,masterGain=null,muted=false,bgTimer=null,lastAutoSound=0;
const PENTATONIC=[130.81,146.83,164.81,196,220,261.63,293.66,329.63,392,440];

function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=muted?0:.52;
    masterGain.connect(audioCtx.destination);scheduleBgNote();
  }catch(e){}
}
function tone(freq,dur,vol,type='sine',delay=0){
  if(!audioCtx||muted)return;
  const t=audioCtx.currentTime+delay,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+Math.min(.08,dur*.3));
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.05);
}
function scheduleBgNote(){
  if(!audioCtx)return;
  const freq=PENTATONIC[Math.floor(Math.random()*PENTATONIC.length)];
  const now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  o.type='triangle';o.frequency.value=freq;f.type='lowpass';f.frequency.value=500;
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(muted?0:.017,now+2.2);g.gain.linearRampToValueAtTime(0,now+7.5);
  o.connect(f);f.connect(g);g.connect(masterGain);o.start(now);o.stop(now+8.2);
  if(Math.random()>.55)tone(freq*1.5,5,.007,'sine',1.2);
  if(Math.random()>.7)tone(freq*.5,3,.010,'sine',0);
  bgTimer=setTimeout(scheduleBgNote,rand(2800,5500));
}
function sndClick(){tone(880,.14,.04,'sine');tone(660,.10,.024,'sine',.05);}
function sndAutoTick(ts){if(!audioCtx||ts-lastAutoSound<2400)return;lastAutoSound=ts;tone(PENTATONIC[Math.floor(Math.random()*PENTATONIC.length)]*2,.09,.013,'sine');}
function sndReveal(idx){const root=PENTATONIC[idx%PENTATONIC.length]*2;[1,1.25,1.5,2].forEach((r,i)=>tone(root*r,2.2,.062/(i+1),'sine',i*.07));for(let i=0;i<4;i++)tone(root*(2+i*.5),.22,.018,'sine',.15+i*.06);}
function sndUpgrade(){[261.63,329.63,392,523.25].forEach((f,i)=>tone(f,.9,.055,'triangle',i*.09));}
function sndStars(){tone(1318.5,.18,.048,'sine');tone(1568,.15,.038,'sine',.1);}

document.getElementById('muteBtn').addEventListener('click',()=>{
  initAudio();muted=!muted;if(masterGain)masterGain.gain.value=muted?0:.52;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
});

// ─── FLASK SYSTEM ─────────────────────────────────────────────────────────────
// Upgrade tiers — lower costs, higher rates (2× previous)
const FLASK_UPS=[
  {name:'CRUDE FLASK',   rate:1.0, nextCost:3 },
  {name:'GLASS FLASK',   rate:2.5, nextCost:7 },
  {name:'CRYSTAL FLASK', rate:5.0, nextCost:14},
  {name:'ARCANE FLASK',  rate:10,  nextCost:26},
  {name:'VOID FLASK',    rate:18,  nextCost:48},
  {name:'QUANTUM FLASK', rate:32,  nextCost:null},
];
// Cost to add the Nth flask (index = current count - 1, so cost for 2nd flask is [0]=8)
const FLASK_ADD_COSTS=[8,16,28,44,64,88,118];
const FLASK_COLS=['#00ccff','#44ddff','#aaeeff','#aa44ff','#6622ff','#ff44ff'];
const FLASK_INNER_BASE=2; // inner particles at LV0

// Flask geometry — small so 8 fit in a row
const FW=13,FH=42,FNW=5,FNH=17; // half-body-width, body-height, half-neck-width, neck-height
const F_STRIDE=FW*2+10;          // 36px per flask slot

function flaskBY(){return H-205;}        // bottom Y of all flask bodies
function flaskTopY(){return flaskBY()-FH-FNH;} // neck tip Y (emit point)
function flaskCX(i){                     // center X of flask i
  const n=flasks.length;
  const rowW=n*F_STRIDE-10;
  return W*.5-rowW*.5+FW+i*F_STRIDE;
}

let flasks=[];  // [{level,accum,innerP,emitGlow,flash,pulse}]

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
let stars=0;
function loadData(){try{return JSON.parse(localStorage.getItem('sr3_data')||'{}');}catch{return{};}}
function saveData(d){try{localStorage.setItem('sr3_data',JSON.stringify(d));}catch{}}
function loadProgress(){try{return JSON.parse(localStorage.getItem('sr3_prog')||'{"done":[]}');}catch{return{done:[]};}}
function saveProgress(p){try{localStorage.setItem('sr3_prog',JSON.stringify(p));}catch{}}
function isUnlocked(i){if(i===0)return true;const p=loadProgress();return p.done&&p.done.includes(i-1);}
function isDone(i){const p=loadProgress();return p.done&&p.done.includes(i);}
function markDone(i){const p=loadProgress();if(!p.done)p.done=[];if(!p.done.includes(i))p.done.push(i);saveProgress(p);}
function loadPlayer(){
  const d=loadData();stars=d.stars||0;
  const sf=d.flasks||[{level:0}];
  flasks=sf.map(f=>({level:Math.min(f.level||0,FLASK_UPS.length-1),accum:0,innerP:[],emitGlow:0,flash:0,pulse:rand(0,Math.PI*2)}));
}
function savePlayer(){const d=loadData();d.stars=stars;d.flasks=flasks.map(f=>({level:f.level}));saveData(d);}
loadPlayer();

// ─── FLOAT TEXTS ─────────────────────────────────────────────────────────────
const floatTexts=[];
function addFloat(text,x,y,col='#ffdd44'){floatTexts.push({text,x,y,alpha:1,vy:-1.1,col});}

// ─── CURRENCY AWARD ──────────────────────────────────────────────────────────
const STARS_PER_REVEAL=5;
function awardStars(n,x,y){
  stars+=n;savePlayer();
  document.getElementById('starsCount').textContent=stars;
  updateFlaskUI();addFloat(`+${n} ⭐`,x,y);sndStars();
}

// ─── FLASK UI ────────────────────────────────────────────────────────────────
function updateFlaskUI(){
  if(!flasks.length)return;
  const totalRate=flasks.reduce((s,f)=>s+FLASK_UPS[f.level].rate,0);
  document.getElementById('flaskTotalInfo').textContent=`AUTO: ${totalRate.toFixed(1)}/s`;
  const btn=document.getElementById('buyFlaskBtn');
  if(flasks.length>=8){btn.style.display='none';}
  else{
    const cost=FLASK_ADD_COSTS[flasks.length-1];
    btn.textContent=`⊕ FLASK #${flasks.length+1} · ${cost}⭐`;
    btn.disabled=(stars<cost);btn.style.display='';
  }
}

// Buy new flask
document.getElementById('buyFlaskBtn').addEventListener('click',()=>{
  initAudio();
  if(flasks.length>=8)return;
  const cost=FLASK_ADD_COSTS[flasks.length-1];
  if(stars<cost){addFloat(`NEED ${cost}⭐`,W*.5,flaskTopY()-18,'#ff4444');return;}
  stars-=cost;
  flasks.push({level:0,accum:0,innerP:[],emitGlow:0,flash:0,pulse:rand(0,Math.PI*2)});
  initAllFlaskInner();  // reinit all (positions shifted)
  savePlayer();
  document.getElementById('starsCount').textContent=stars;
  updateFlaskUI();sndUpgrade();
  addFloat(`FLASK #${flasks.length} ONLINE!`,W*.5,flaskTopY()-22,'#00ffff');
});

// Upgrade individual flask (called from canvas click)
function upgradeFlask(idx){
  const f=flasks[idx];
  const curr=FLASK_UPS[f.level];
  if(!curr.nextCost){addFloat('MAX LEVEL',flaskCX(idx),flaskTopY()-18,FLASK_COLS[f.level]);return;}
  if(stars<curr.nextCost){addFloat(`NEED ${curr.nextCost}⭐`,flaskCX(idx),flaskTopY()-18,'#ff4444');return;}
  stars-=curr.nextCost;f.level++;f.flash=1;
  savePlayer();
  document.getElementById('starsCount').textContent=stars;
  updateFlaskUI();sndUpgrade();
  addFloat(`LV.${f.level+1}!`,flaskCX(idx),flaskTopY()-18,'#ffdd44');
}

// ─── FLASK INNER PARTICLES ───────────────────────────────────────────────────
function initFlaskInner(i){
  const f=flasks[i];const bx=flaskCX(i),by=flaskBY();
  f.innerP=[];const max=FLASK_INNER_BASE+f.level;
  for(let k=0;k<max;k++){
    f.innerP.push({x:bx+rand(-FW*.65,FW*.65),y:by-rand(4,FH-4),vx:rand(-.5,.5),vy:rand(-.5,.5),colIdx:Math.floor(rand(0,Math.max(1,levelPCols.length))),sz:rand(.7,1.5)});
  }
}
function initAllFlaskInner(){for(let i=0;i<flasks.length;i++)initFlaskInner(i);}

function updateFlaskInner(i,dt){
  const f=flasks[i];const bx=flaskCX(i),by=flaskBY();
  const max=FLASK_INNER_BASE+f.level;
  for(const p of f.innerP){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.x<bx-FW+2)p.vx=Math.abs(p.vx);if(p.x>bx+FW-2)p.vx=-Math.abs(p.vx);
    if(p.y<by-FH+2)p.vy=Math.abs(p.vy);if(p.y>by-2)p.vy=-Math.abs(p.vy);
    p.vx+=rand(-.035,.035);p.vy+=rand(-.035,.035);
    const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>1.0){p.vx*=1/sp;p.vy*=1/sp;}
    if(Math.random()<.004)p.colIdx=Math.floor(rand(0,Math.max(1,levelPCols.length)));
  }
  while(f.innerP.length<max){f.innerP.push({x:bx+rand(-FW*.65,FW*.65),y:by-rand(4,FH-4),vx:rand(-.5,.5),vy:rand(-.5,.5),colIdx:Math.floor(rand(0,Math.max(1,levelPCols.length))),sz:rand(.7,1.5)});}
  if(f.innerP.length>max)f.innerP.length=max;
}

// ─── STARFIELD ───────────────────────────────────────────────────────────────
const NS=200;
const sX=new Float32Array(NS),sY=new Float32Array(NS),sR=new Float32Array(NS);
const sPh=new Float32Array(NS),sSpd=new Float32Array(NS),sBa=new Float32Array(NS);
function initStarField(){for(let i=0;i<NS;i++){sX[i]=rand(0,W);sY[i]=rand(0,H);sR[i]=rand(.2,1.8);sPh[i]=rand(0,Math.PI*2);sSpd[i]=rand(.003,.022);sBa[i]=rand(.2,.75);}}

// ─── PARTICLE POOL ───────────────────────────────────────────────────────────
const MAX_P=420,TMAX=10;
const pSX=new Float32Array(MAX_P),pSY=new Float32Array(MAX_P);
const pX=new Float32Array(MAX_P),pY=new Float32Array(MAX_P);
const pTX=new Float32Array(MAX_P),pTY=new Float32Array(MAX_P);
const pCPX=new Float32Array(MAX_P),pCPY=new Float32Array(MAX_P);
const pT=new Float32Array(MAX_P),pSpd=new Float32Array(MAX_P),pSZ=new Float32Array(MAX_P);
const pDead=new Uint8Array(MAX_P),pCI=new Uint8Array(MAX_P),pSI=new Int32Array(MAX_P);
const tBuf=new Float32Array(MAX_P*TMAX*2),tLen=new Uint8Array(MAX_P),tHd=new Uint8Array(MAX_P);
let pCount=0,pAlive=0;
function pushTrail(i,x,y){const b=i*TMAX*2,s=tHd[i];tBuf[b+s*2]=x;tBuf[b+s*2+1]=y;tHd[i]=(s+1)%TMAX;if(tLen[i]<TMAX)tLen[i]++;}
function allocP(){if(pAlive>=MAX_P)return-1;for(let i=0;i<pCount;i++)if(pDead[i]){pDead[i]=0;tLen[i]=0;tHd[i]=0;return i;}if(pCount<MAX_P){const i=pCount++;pDead[i]=0;tLen[i]=0;tHd[i]=0;return i;}return-1;}

// ─── LEVELS ──────────────────────────────────────────────────────────────────
function pizzaSlices(){
  const R=108,names=['TOMATO SAUCE','MOZZARELLA','PEPPERONI','FRESH BASIL','PLUM TOMATO','BURRATA','STONE CRUST','PROSCIUTTO'];
  const cols=['#cc3311','#ffcc33','#ff6600','#44aa22','#cc2211','#ffdd55','#884422','#ff8844'];
  return Array.from({length:8},(_,i)=>{
    const a1=-Math.PI/2+i*Math.PI/4,a2=a1+Math.PI/4,am=(a1+a2)/2,r2=R*1.02;
    return{name:names[i],col:cols[i],pts:[[0,0],[Math.round(R*Math.cos(a1)),Math.round(R*Math.sin(a1))],[Math.round(r2*Math.cos(am)),Math.round(r2*Math.sin(am))],[Math.round(R*Math.cos(a2)),Math.round(R*Math.sin(a2))]]};
  });
}
const LEVELS=[

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let sectors,activeRevIdx,gameWon,shakeLeft,shakeAmt,time,currentLvl=0,levelPCols=[];

function pip(px,py,poly){let ins=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const[xi,yi]=poly[i],[xj,yj]=poly[j];if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))ins=!ins;}return ins;}

function rebuildPolys(){
  if(!sectors)return;
  const cx=SCX(),cy=SCY();
  for(const s of sectors){s.poly=s.def.pts.map(([rx,ry])=>[cx+rx,cy+ry]);let sx=0,sy=0;for(const[x,y]of s.poly){sx+=x;sy+=y;}s.cx=sx/s.poly.length;s.cy=sy/s.poly.length;}
  initAllFlaskInner();
}

function setTheme(col){
  document.documentElement.style.setProperty('--hcol',col);
  document.getElementById('progressFill').style.background=`linear-gradient(90deg,${col},#ff00ff)`;
  const b=document.getElementById('chargeBtn');b.style.color=col;b.style.borderColor=col;b.style.textShadow=`0 0 10px ${col}`;
}

function activeSecIdx(){return LEVELS[currentLvl].reveal[activeRevIdx];}

function updateHUD(){
  const lvl=LEVELS[currentLvl],aidx=activeSecIdx(),active=sectors&&sectors[aidx];
  document.getElementById('hudTitle').textContent=`LV.${String(currentLvl+1).padStart(2,'0')} · ${lvl.name}`;
  document.getElementById('sectorLabel').textContent=gameWon?'MISSION COMPLETE':(active&&!active.revealed)?`CHARGING: ${active.def.name}`:'COMPLETE';
  document.getElementById('progressFill').style.width=gameWon?'100%':(active&&!active.revealed)?`${(active.fill*100).toFixed(0)}%`:'100%';
  document.getElementById('indicators').textContent=LEVELS[currentLvl].reveal.map(idx=>sectors[idx].revealed?'▣':idx===aidx&&!gameWon?'▸':'□').join(' ');
}

function initGame(lvlIdx){
  currentLvl=lvlIdx;
  const lvl=LEVELS[lvlIdx];
  levelPCols=lvl.pcols.map(hexRGB);
  setTheme(lvl.theme);
  sectors=lvl.sectors.map(def=>({def,fill:0,revealed:false,flash:0,pulse:rand(0,Math.PI*2),innerP:[],rings:[],poly:null,cx:0,cy:0,rgb:hexRGB(def.col)}));
  pDead.fill(1);pCount=0;pAlive=0;tLen.fill(0);tHd.fill(0);
  activeRevIdx=0;gameWon=false;shakeLeft=0;shakeAmt=0;time=0;
  for(const f of flasks)f.accum=0; // reset accum, keep upgrades
  rebuildPolys();
  document.getElementById('selector').classList.add('hidden');
  document.getElementById('win').classList.remove('show');
  document.getElementById('panel').style.display='flex';
  document.getElementById('flaskCtrl').style.display='flex';
  document.getElementById('starsCount').textContent=stars;
  updateFlaskUI();updateHUD();
}

// ─── SPAWN ───────────────────────────────────────────────────────────────────
function spawnBurst(n,fx,fy){
  if(gameWon||!sectors||activeRevIdx>=LEVELS[currentLvl].reveal.length)return;
  const sec=sectors[activeSecIdx()],{cx,cy}=sec;
  for(let k=0;k<n;k++){
    const i=allocP();if(i<0)break;pAlive++;
    const tx=cx+rand(-42,42),ty=cy+rand(-28,28),mx=(fx+tx)*.5,my=(fy+ty)*.5;
    pSX[i]=fx+rand(-14,14);pSY[i]=fy+rand(-6,6);
    pX[i]=pSX[i];pY[i]=pSY[i];pTX[i]=tx;pTY[i]=ty;
    pCPX[i]=mx+rand(-200,200);pCPY[i]=my-rand(80,210);
    pT[i]=0;pSpd[i]=rand(.011,.025);pSZ[i]=rand(1.1,2.6);
    pCI[i]=Math.floor(rand(0,Math.max(1,levelPCols.length)));pSI[i]=activeSecIdx();pDead[i]=0;
  }
}

// Auto-spawn: all flasks update independently
function updateAutoSpawn(dt,ts){
  if(gameWon||!sectors)return;
  for(let i=0;i<flasks.length;i++){
    const f=flasks[i];
    f.accum+=(FLASK_UPS[f.level].rate*dt)/60;
    const n=Math.floor(f.accum);
    if(n>0){
      f.accum-=n;f.emitGlow=1;
      spawnBurst(n,flaskCX(i),flaskTopY());
      if(i===0)sndAutoTick(ts);
    }
  }
}

// ─── BUTTON — halved burst sizes ─────────────────────────────────────────────
const chgBtn=document.getElementById('chargeBtn');
let holdActive=false,holdTO=null,holdRate=80;
function startHold(){
  if(gameWon)return;initAudio();
  const[bx,by]=getBtnPos();
  spawnBurst(9,bx,by);sndClick();       // ← was 18, now 9
  chgBtn.classList.add('active');holdActive=true;holdRate=80;
  (function lp(){
    if(!holdActive)return;
    if(!gameWon){const[bx2,by2]=getBtnPos();spawnBurst(7,bx2,by2);}  // ← was 14, now 7
    holdRate=Math.max(38,holdRate-1.5);holdTO=setTimeout(lp,holdRate);
  })();
}
function stopHold(){holdActive=false;chgBtn.classList.remove('active');if(holdTO){clearTimeout(holdTO);holdTO=null;}}
function getBtnPos(){const r=chgBtn.getBoundingClientRect();return[r.left+r.width*.5,r.top+r.height*.5];}
chgBtn.addEventListener('mousedown',startHold);chgBtn.addEventListener('mouseup',stopHold);chgBtn.addEventListener('mouseleave',stopHold);
chgBtn.addEventListener('touchstart',e=>{e.preventDefault();startHold();},{passive:false});chgBtn.addEventListener('touchend',stopHold);

// ─── CANVAS INTERACTIONS (flask upgrade + cursor) ─────────────────────────────
canvas.addEventListener('mousemove',e=>{
  if(!sectors){canvas.style.cursor='default';return;}
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const by=flaskBY(),topY=flaskTopY();
  let over=false;
  for(let i=0;i<flasks.length;i++){const bx=flaskCX(i);if(mx>bx-FW-10&&mx<bx+FW+10&&my>topY-10&&my<by+10){over=true;break;}}
  canvas.style.cursor=over?'pointer':'default';
});

canvas.addEventListener('click',e=>{
  initAudio();
  if(!sectors)return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const by=flaskBY(),topY=flaskTopY();
  for(let i=0;i<flasks.length;i++){
    const bx=flaskCX(i);
    if(mx>bx-FW-10&&mx<bx+FW+10&&my>topY-10&&my<by+10){upgradeFlask(i);return;}
  }
});

// ─── REVEAL ──────────────────────────────────────────────────────────────────
const MAX_INNER=18;
function revealSector(sIdx){
  const sec=sectors[sIdx];if(sec.revealed)return;
  sec.revealed=true;sec.flash=1;shakeLeft=20;shakeAmt=7;
  const{cx,cy}=sec;
  for(let k=0;k<55;k++){const ang=rand(0,Math.PI*2),spd=rand(1.5,6);sec.innerP.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,colIdx:Math.floor(rand(0,Math.max(1,levelPCols.length))),sz:rand(1,3.5),life:1});}
  sec.rings=[{r:0,a:1},{r:0,a:.6,d:10},{r:0,a:.4,d:20}];
  awardStars(STARS_PER_REVEAL,cx,cy-20);
  sndReveal(activeRevIdx);
  activeRevIdx=Math.min(activeRevIdx+1,LEVELS[currentLvl].reveal.length);
  if(activeRevIdx>=LEVELS[currentLvl].reveal.length){
    gameWon=true;markDone(currentLvl);
    const lvl=LEVELS[currentLvl];
    setTimeout(()=>{
      document.getElementById('winEmoji').textContent=lvl.icon;
      document.getElementById('winSub').textContent=lvl.name+' · FULLY RESTORED';
      document.getElementById('nextBtn').style.display=currentLvl<LEVELS.length-1?'':'none';
      document.getElementById('win').classList.add('show');
    },1700);
  }
}

// ─── SELECTOR ────────────────────────────────────────────────────────────────
function renderPreview(cv,defs,theme){
  const c2=cv.getContext('2d');c2.clearRect(0,0,cv.width,cv.height);
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  for(const d of defs)for(const[px,py]of d.pts){mnX=Math.min(mnX,px);mxX=Math.max(mxX,px);mnY=Math.min(mnY,py);mxY=Math.max(mxY,py);}
  const sw=mxX-mnX||1,sh=mxY-mnY||1,sc=Math.min((cv.width-6)/sw,(cv.height-6)/sh);
  const ox=cv.width*.5-(mnX+mxX)*.5*sc,oy=cv.height*.5-(mnY+mxY)*.5*sc;
  for(const d of defs){c2.beginPath();c2.moveTo(d.pts[0][0]*sc+ox,d.pts[0][1]*sc+oy);for(let j=1;j<d.pts.length;j++)c2.lineTo(d.pts[j][0]*sc+ox,d.pts[j][1]*sc+oy);c2.closePath();c2.strokeStyle=d.col;c2.lineWidth=.85;c2.globalAlpha=.65;c2.stroke();}
}
function buildSelectorCards(){
  const grid=document.getElementById('sel-grid');grid.innerHTML='';
  LEVELS.forEach((lvl,i)=>{
    const unlocked=isUnlocked(i),done=isDone(i);
    const card=document.createElement('div');
    card.className='sel-card'+(unlocked?'':' locked')+(done?' done':'');
    const cv=document.createElement('canvas');cv.width=88;cv.height=50;renderPreview(cv,lvl.sectors,lvl.theme);
    card.appendChild(cv);
    card.innerHTML+=`<div class="sel-lv">LV.${String(i+1).padStart(2,'0')}</div><div class="sel-name">${lvl.name}</div><div class="sel-badge">${done?'▣ COMPLETE':unlocked?'● UNLOCKED':'▪ LOCKED'}</div>`;
    if(unlocked)card.onclick=()=>{initAudio();initGame(i);};
    grid.appendChild(card);
  });
}
function showSelector(){
  document.getElementById('selector').classList.remove('hidden');
  document.getElementById('win').classList.remove('show');
  document.getElementById('panel').style.display='none';
  document.getElementById('flaskCtrl').style.display='none';
  buildSelectorCards();
}
function nextLevel(){const n=currentLvl+1;if(n<LEVELS.length)initGame(n);else showSelector();}

// ─── DRAW FLASK ROW ───────────────────────────────────────────────────────────
function drawAllFlasks(dt){
  const by=flaskBY(),topY=flaskTopY();

  for(let i=0;i<flasks.length;i++){
    const f=flasks[i];
    const bx=flaskCX(i);
    if(f.flash>0)f.flash=Math.max(0,f.flash-.025*dt);
    if(f.emitGlow>0)f.emitGlow=Math.max(0,f.emitGlow-.08*dt);
    f.pulse+=.022*dt;

    updateFlaskInner(i,dt);

    const fCol=FLASK_COLS[f.level];
    const[fr,fg,fb]=hexRGB(fCol);
    const pN=(Math.sin(f.pulse)+1)*.5;
    const fl=f.flash;

    ctx.save();

    // Flask polygon path
    ctx.beginPath();
    ctx.moveTo(bx-FW,by);   ctx.lineTo(bx+FW,by);
    ctx.lineTo(bx+FW,by-FH);ctx.lineTo(bx+FNW,by-FH);
    ctx.lineTo(bx+FNW,topY);ctx.lineTo(bx-FNW,topY);
    ctx.lineTo(bx-FNW,by-FH);ctx.lineTo(bx-FW,by-FH);
    ctx.closePath();

    // Animated liquid fill
    const liqY=by-FH*(.38+pN*.18);
    ctx.save();ctx.clip();
    ctx.fillStyle=`rgba(${fr},${fg},${fb},${.07+fl*.2})`;
    ctx.fillRect(bx-FW,liqY,FW*2,by-liqY);
    // Shimmer line
    ctx.fillStyle=`rgba(${fr},${fg},${fb},${.04+pN*.04})`;
    ctx.fillRect(bx-FW,liqY-4,FW*2,7);
    ctx.restore();

    // Glow halo (wide + faint)
    ctx.strokeStyle=`rgba(${fr},${fg},${fb},${.09+fl*.14})`;ctx.lineWidth=8+fl*5;ctx.stroke();
    // Crisp border
    ctx.strokeStyle=`rgba(${fr},${fg},${fb},${.62+fl*.35})`;ctx.lineWidth=1.2;ctx.stroke();

    // Level number inside
    ctx.font='bold 7px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillStyle=`rgba(${fr},${fg},${fb},.8)`;
    ctx.fillText(`${f.level+1}`,bx,by-FH*.35+3);

    // Emit glow at neck opening
    if(f.emitGlow>0){
      ctx.globalCompositeOperation='lighter';ctx.globalAlpha=f.emitGlow*.38;
      ctx.fillStyle=`rgba(${fr},${fg},${fb},1)`;
      ctx.beginPath();ctx.arc(bx,topY,FNW*2,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
    }

    // Inner particles
    if(f.innerP.length>0){
      ctx.globalCompositeOperation='lighter';
      for(const p of f.innerP){
        const pc=levelPCols[p.colIdx]||[fr,fg,fb];const[pr,pg,pb]=pc;
        ctx.globalAlpha=.32;ctx.fillStyle=`rgba(${pr},${pg},${pb},1)`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.sz*1.9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.72;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
      }
      ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
    }

    ctx.restore();
  }

  // Upgrade cost labels beneath each flask (drawn after all flasks)
  ctx.textAlign='center';
  for(let i=0;i<flasks.length;i++){
    const f=flasks[i],bx=flaskCX(i);
    const curr=FLASK_UPS[f.level];
    if(curr.nextCost){
      const canAfford=stars>=curr.nextCost;
      ctx.font='bold 6px Orbitron,monospace';
      ctx.fillStyle=canAfford?'#ffdd44':'rgba(140,120,50,.4)';
      if(canAfford){ctx.shadowColor='#ffdd44';ctx.shadowBlur=5;}
      ctx.fillText(`${curr.nextCost}⭐`,bx,by+14);
      ctx.shadowBlur=0;
    }else{
      ctx.font='bold 5px Orbitron,monospace';
      ctx.fillStyle=FLASK_COLS[f.level];
      ctx.fillText('MAX',bx,by+14);
    }
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function polyPath(poly){ctx.beginPath();ctx.moveTo(poly[0][0],poly[0][1]);for(let i=1;i<poly.length;i++)ctx.lineTo(poly[i][0],poly[i][1]);ctx.closePath();}

function updateInner(sec,poly,dt){
  const{cx,cy}=sec;let alive=0;
  for(let i=0;i<sec.innerP.length;i++){const p=sec.innerP[i];p.life-=(sec.revealed?.007:.004)*dt;if(p.life<=0)continue;p.x+=p.vx*dt;p.y+=p.vy*dt;if(!sec.revealed&&!pip(p.x,p.y,poly)){const dx=cx-p.x,dy=cy-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;p.vx=(dx/d)*rand(1.5,3);p.vy=(dy/d)*rand(1.5,3);}p.vx+=rand(-.3,.3);p.vy+=rand(-.3,.3);const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>3){p.vx*=3/sp;p.vy*=3/sp;}sec.innerP[alive++]=p;}
  sec.innerP.length=alive;if(sec.innerP.length>MAX_INNER)sec.innerP.length=MAX_INNER;
}

function drawShip(dt){
  if(!sectors)return;
  for(const sec of sectors){
    sec.pulse+=.018*dt;if(sec.flash>0)sec.flash=Math.max(0,sec.flash-.018*dt);
    const{poly,cx,cy,rgb}=sec;if(!poly)continue;
    const sIdx=LEVELS[currentLvl].sectors.indexOf(sec.def);
    const isActive=sIdx===activeSecIdx()&&!gameWon;
    const pN=(Math.sin(sec.pulse)+1)*.5;const[r,g,b]=rgb;
    updateInner(sec,poly,dt);ctx.save();
    if(sec.revealed){
      const fl=sec.flash;
      polyPath(poly);
      ctx.fillStyle=`rgba(${r},${g},${b},${(.10+fl*.38+Math.sin(sec.pulse)*.02).toFixed(3)})`;ctx.fill();
      ctx.strokeStyle=`rgba(${r},${g},${b},${(.11+fl*.13).toFixed(3)})`;ctx.lineWidth=14+fl*8;ctx.stroke();
      ctx.strokeStyle=`rgba(${r},${g},${b},${(.8+fl*.2).toFixed(3)})`;ctx.lineWidth=2+fl*2;ctx.stroke();
      for(const ring of sec.rings){if((ring.d||0)>0){ring.d-=dt;continue;}ring.r+=5*dt;ring.a-=.018*dt;if(ring.a>0){ctx.strokeStyle=`rgba(${r},${g},${b},${ring.a.toFixed(3)})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,ring.r,0,Math.PI*2);ctx.stroke();}}
      sec.rings=sec.rings.filter(rg=>rg.a>0);
    }else{
      const ab=isActive?.35:0,wA=clamp(.18+pN*.28+ab+sec.fill*.12,0,1);
      polyPath(poly);
      if(sec.fill>0){ctx.fillStyle=`rgba(${r},${g},${b},${(sec.fill*.11+pN*sec.fill*.06).toFixed(3)})`;ctx.fill();}
      ctx.strokeStyle=`rgba(${r},${g},${b},${(wA*.16).toFixed(3)})`;ctx.lineWidth=isActive?16:10;ctx.stroke();
      ctx.strokeStyle=`rgba(${r},${g},${b},${wA.toFixed(3)})`;ctx.lineWidth=isActive?1.8:1.2;ctx.stroke();
      ctx.fillStyle=`rgba(${r},${g},${b},${(.3+pN*.55).toFixed(3)})`;
      ctx.beginPath();for(const[vx,vy]of poly){ctx.moveTo(vx+3,vy);ctx.arc(vx,vy,3,0,Math.PI*2);}ctx.fill();
      if(isActive){ctx.save();polyPath(poly);ctx.clip();const sy=cy-50+((time*22)%100);const sg=ctx.createLinearGradient(0,sy-10,0,sy+10);sg.addColorStop(0,'rgba(0,0,0,0)');sg.addColorStop(.5,`rgba(${r},${g},${b},.13)`);sg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sg;ctx.fillRect(cx-200,sy-10,400,20);ctx.restore();}
      if(isActive&&sec.fill>.05){ctx.font='bold 8px Orbitron,monospace';ctx.textAlign='center';ctx.fillStyle=`rgba(${r},${g},${b},.65)`;ctx.fillText(`${Math.floor(sec.fill*100)}%`,cx,cy+4);}
    }
    if(sec.innerP.length>0){
      ctx.globalCompositeOperation='lighter';
      for(const p of sec.innerP){if(p.life<=0)continue;const[pr,pg,pb]=levelPCols[p.colIdx]||[255,255,255];const a=Math.min(p.life*.9,.85);const sz=p.sz*(p.life>.25?1:p.life/.25);ctx.globalAlpha=a*.4;ctx.fillStyle=`rgba(${pr},${pg},${pb},1)`;ctx.beginPath();ctx.arc(p.x,p.y,sz*2.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();}
      ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
    }
    ctx.restore();
  }
}

function drawParticles(dt){
  ctx.globalCompositeOperation='lighter';ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=0;i<pCount;i++){
    if(pDead[i])continue;
    pT[i]+=pSpd[i]*dt;
    if(pT[i]>=1){
      const sIdx=pSI[i],sec=sectors&&sectors[sIdx];
      if(sec&&!sec.revealed){
        sec.fill=Math.min(1,sec.fill+rand(.015,.025));
        if(sec.innerP.length<MAX_INNER){const ang=rand(0,Math.PI*2);sec.innerP.push({x:pTX[i],y:pTY[i],vx:Math.cos(ang)*rand(.8,2.5),vy:Math.sin(ang)*rand(.8,2.5),colIdx:pCI[i],sz:pSZ[i]*.85,life:rand(.7,1)});}
        if(sec.fill>=1)revealSector(sIdx);
      }
      pDead[i]=1;pAlive--;continue;
    }
    const t=pT[i],mt=1-t;
    const nx=mt*mt*pSX[i]+2*mt*t*pCPX[i]+t*t*pTX[i];
    const ny=mt*mt*pSY[i]+2*mt*t*pCPY[i]+t*t*pTY[i];
    pX[i]=nx;pY[i]=ny;pushTrail(i,nx,ny);
    const[pr,pg,pb]=levelPCols[pCI[i]]||[255,255,255];const sz=pSZ[i];
    const tl=tLen[i],hd=tHd[i],base=i*TMAX*2;
    if(tl>1){ctx.globalAlpha=.55;ctx.strokeStyle=`rgba(${pr},${pg},${pb},1)`;ctx.lineWidth=sz*.85;ctx.beginPath();const old=(hd-tl+TMAX)%TMAX;ctx.moveTo(tBuf[base+old*2],tBuf[base+old*2+1]);for(let j=1;j<tl;j++){const idx=(old+j)%TMAX;ctx.lineTo(tBuf[base+idx*2],tBuf[base+idx*2+1]);}ctx.stroke();}
    ctx.globalAlpha=.28;ctx.fillStyle=`rgba(${pr},${pg},${pb},1)`;ctx.beginPath();ctx.arc(nx,ny,sz*3.2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.65;ctx.beginPath();ctx.arc(nx,ny,sz*1.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(nx,ny,sz*.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
}

function drawFloatTexts(dt){
  if(!floatTexts.length)return;
  ctx.textAlign='center';
  for(let i=floatTexts.length-1;i>=0;i--){
    const f=floatTexts[i];f.y+=f.vy*dt;f.alpha-=.022*dt;
    if(f.alpha<=0){floatTexts.splice(i,1);continue;}
    ctx.globalAlpha=f.alpha;ctx.shadowColor=f.col;ctx.shadowBlur=8;
    ctx.fillStyle=f.col;ctx.font='bold 13px Orbitron,monospace';ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/16.667,3);last=ts;time+=dt;

  ctx.fillStyle='#000d20';ctx.fillRect(0,0,W,H);
  const ng=ctx.createRadialGradient(SCX(),SCY()-20,0,SCX(),SCY()-20,200);
  ng.addColorStop(0,'rgba(8,35,80,.15)');ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);

  let ox=0,oy=0;
  if(shakeLeft>0){shakeLeft-=dt;shakeAmt*=.93;ox=rand(-shakeAmt,shakeAmt);oy=rand(-shakeAmt,shakeAmt);ctx.save();ctx.translate(ox,oy);}

  // Stars
  ctx.fillStyle='#fff';
  for(let i=0;i<NS;i++){sPh[i]+=sSpd[i]*dt;ctx.globalAlpha=(Math.sin(sPh[i])*.44+.56)*sBa[i];const r=sR[i];ctx.fillRect(sX[i]-r,sY[i]-r,r*2,r*2);}
  ctx.globalAlpha=1;

  drawShip(dt);
  if(sectors){drawAllFlasks(dt);updateAutoSpawn(dt,ts);}
  drawParticles(dt);
  drawFloatTexts(dt);

  if(shakeLeft>0||(ox||oy))ctx.restore();
  if(sectors)updateHUD();
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});
resize();
showSelector();
requestAnimationFrame(loop);
</script>
